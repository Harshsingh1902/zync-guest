<!DOCTYPE html>
<html lang="en" data-theme="obsidian">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZYNC — Guest Terminal</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* ── THEME TOKENS ─────────────────────────────────────────── */
        :root { --transition: 0.55s cubic-bezier(.4,0,.2,1); }

        [data-theme="obsidian"] {
            --bg-a: #080810; --bg-b: #0f0f1a; --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08); --accent: #00FFB2; --accent-alt: #63b3ed;
            --text-primary: #edf2f7; --text-muted: #718096; --btn-bg: #00FFB2;
            --btn-text: #080810; --live-color: #00FFB2; --glow: rgba(0, 255, 178, 0.15);
            --particle: rgba(0, 255, 178, 0.6);
        }

        /* ── RESET & BASE ─────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(145deg, var(--bg-a) 0%, var(--bg-b) 100%);
            color: var(--text-primary);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* ── SCANNER UI ───────────────────────────────────────────── */
        #reader-wrapper {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #000;
            margin-bottom: 20px;
            display: none; /* Shown when 'Scan' is clicked */
        }

        /* ── CARD ─────────────────────────────────────────────────── */
        .card {
            background: var(--surface);
            backdrop-filter: blur(28px);
            border: 1px solid var(--border);
            border-radius: 28px;
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 60px var(--glow);
            text-align: center;
        }

        .logo-icon {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 32px;
            letter-spacing: 6px;
            color: var(--accent);
            margin-bottom: 8px;
            text-shadow: 0 0 15px var(--glow);
        }

        .subtitle {
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.3);
            color: var(--text-primary);
            font-family: 'DM Mono', monospace;
            margin-bottom: 15px;
            text-align: center;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary { background: var(--btn-bg); color: var(--btn-text); grid-column: span 2; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--border); }

        .status-msg {
            margin-top: 20px;
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            color: var(--text-muted);
        }

        #remoteAudio { width: 100%; margin-top: 20px; display: none; }

        /* ── VISUALIZER ───────────────────────────────────────────── */
        .visualizer {
            display: none;
            gap: 4px;
            align-items: center;
            justify-content: center;
            height: 40px;
            margin-top: 20px;
        }
        .viz-bar { width: 4px; height: 10px; background: var(--accent); border-radius: 2px; }
        .active .viz-bar { animation: wave 0.6s infinite alternate; }
        @keyframes wave { from { height: 5px; } to { height: 35px; } }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-icon">ZYNC</div>
        <div class="subtitle">Guest Terminal</div>

        <div id="reader-wrapper">
            <div id="reader"></div>
        </div>

        <input type="text" id="hostId" placeholder="HOST ID OR SCAN QR" autocomplete="off">
        
        <div class="btn-group">
            <button class="btn-secondary" onclick="startScanner()">Open Scanner</button>
            <button class="btn-secondary" onclick="pasteId()">Paste ID</button>
            <button class="btn-primary" id="connectBtn">Connect & Listen</button>
        </div>

        <div class="status-msg" id="status">Ready to sync</div>

        <div class="visualizer" id="visualizer">
            <div class="viz-bar" style="animation-delay: 0.1s"></div>
            <div class="viz-bar" style="animation-delay: 0.3s"></div>
            <div class="viz-bar" style="animation-delay: 0.2s"></div>
            <div class="viz-bar" style="animation-delay: 0.4s"></div>
            <div class="viz-bar" style="animation-delay: 0.1s"></div>
        </div>

        <audio id="remoteAudio" controls autoplay></audio>
    </div>

    <script>
        const peer = new Peer();
        const hostIdInput = document.getElementById('hostId');
        const statusText = document.getElementById('status');
        const visualizer = document.getElementById('visualizer');
        const remoteAudio = document.getElementById('remoteAudio');
        let html5QrCode = null;

        // 1. Scanner Logic
        function startScanner() {
            document.getElementById('reader-wrapper').style.display = 'block';
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                // Extract Host ID if the QR is a URL (e.g., ...?host=ID)
                let id = decodedText;
                try {
                    const url = new URL(decodedText);
                    id = url.searchParams.get("host") || decodedText;
                } catch(e) {}
                
                hostIdInput.value = id;
                stopScanner();
                statusText.textContent = "Host ID captured.";
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader-wrapper').style.display = 'none';
                });
            }
        }

        async function pasteId() {
            const text = await navigator.clipboard.readText();
            hostIdInput.value = text;
        }

        // 2. PeerJS Logic
        document.getElementById('connectBtn').onclick = () => {
            const hostId = hostIdInput.value.trim();
            if (!hostId) return;

            statusText.textContent = "Establishing P2P link...";
            
            // PeerJS Call
            const call = peer.call(hostId, new MediaStream());
            
            call.on('stream', (stream) => {
                statusText.textContent = "CONNECTED • STREAMING LIVE";
                statusText.style.color = "var(--accent)";
                visualizer.style.display = "flex";
                visualizer.classList.add('active');
                
                remoteAudio.srcObject = stream;
                remoteAudio.play();
            });

            call.on('error', (err) => {
                statusText.textContent = "Connection failed. Check Host ID.";
                console.error(err);
            });
        };
    </script>
</body>
</html>
